name: Setup Branch Protection

on:
    workflow_run:
        workflows: ["Build"]
        types: [completed]
        branches: [main]

jobs:
    setup-protection:
        runs-on: ubuntu-latest
        if: ${{ !github.event.workflow_run.conclusion || github.event.workflow_run.conclusion == 'success' }}
        steps:
            -
                uses: actions/create-github-app-token@v1
                id: app-token
                with:
                    app-id: ${{ secrets.APP_ID }}
                    private-key: ${{ secrets.APP_PRIVATE_KEY }}
                    owner: ${{ github.repository_owner }}

            -
                name: Setup branch protection
                env:
                    GH_TOKEN: ${{ steps.app-token.outputs.token }}
                run: |
                    # Skip if branch protection already configured
                    STATUS=$(gh api repos/${{ github.repository }}/branches/main/protection \
                      --jq '.required_pull_request_reviews != null or .required_status_checks != null' \
                      2>/dev/null || echo "false")
                    if [ "$STATUS" = "true" ]; then
                        echo "Branch protection already configured, skipping."
                        exit 0
                    fi

                    python3 - <<'EOF'
                    import json, os, subprocess

                    repo = os.environ['GITHUB_REPOSITORY']

                    payload = {
                        "required_status_checks": {
                            "strict": False,
                            "contexts": ["build"]
                        },
                        "enforce_admins": False,
                        "required_pull_request_reviews": {
                            "required_approving_review_count": 0,
                            "dismiss_stale_reviews": False,
                            "require_code_owner_reviews": False
                        },
                        "restrictions": None
                    }

                    result = subprocess.run(
                        ["gh", "api", f"repos/{repo}/branches/main/protection",
                         "--method", "PUT", "--input", "-"],
                        input=json.dumps(payload).encode(),
                        capture_output=True
                    )
                    print(result.stdout.decode())
                    if result.returncode != 0:
                        print(result.stderr.decode(), flush=True)
                        exit(result.returncode)
                    EOF