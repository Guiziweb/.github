name: Bootstrap Plugin

on:
    workflow_dispatch:
        inputs:
            repo:
                description: 'Target repo name (e.g. GuiziwebTestPlugin)'
                required: true
            company:
                description: 'Company name (PascalCase, e.g. Guiziweb)'
                required: true
            name:
                description: 'Plugin name (PascalCase, e.g. Test)'
                required: true
            description:
                description: 'Plugin description'
                required: true
            org:
                description: 'GitHub org'
                required: false
                default: 'Guiziweb'

jobs:
    bootstrap:
        runs-on: ubuntu-latest
        steps:
            -
                uses: actions/checkout@v4

            -
                uses: actions/create-github-app-token@v1
                id: app-token
                with:
                    app-id: ${{ secrets.APP_ID }}
                    private-key: ${{ secrets.APP_PRIVATE_KEY }}
                    owner: ${{ inputs.org }}

            -
                name: Derive names
                id: meta
                env:
                    COMPANY: ${{ inputs.company }}
                    NAME: ${{ inputs.name }}
                run: |
                    python3 - >> $GITHUB_OUTPUT <<'EOF'
                    import re, os

                    company = os.environ['COMPANY']
                    name = os.environ['NAME']
                    company_kebab = re.sub(r'([a-z])([A-Z])', r'\1-\2', company).lower()
                    name_kebab = re.sub(r'([a-z])([A-Z])', r'\1-\2', name).lower()

                    print(f'company_kebab={company_kebab}')
                    print(f'name_kebab={name_kebab}')
                    EOF

            -
                name: Clone skeleton
                run: |
                    git clone https://github.com/Sylius/PluginSkeleton.git /tmp/plugin

            -
                name: Rename plugin
                working-directory: /tmp/plugin
                run: |
                    composer install --no-interaction --quiet
                    php bin/rename-plugin.php \
                      --company="${{ inputs.company }}" \
                      --plugin-name="${{ inputs.name }}" \
                      --description="${{ inputs.description }}" \
                      --skip-interaction

            -
                name: Cleanup skeleton
                working-directory: /tmp/plugin
                run: |
                    python3 - <<'EOF'
                    import os, re, shutil

                    files_to_remove = [
                        'RENAME_GUIDE.md', 'CLAUDE.md', 'AGENTS.md',
                        'CLEANUP_GUIDE.md', 'COMPATIBILITY_GUIDE.md',
                        'src/Controller/GreetingController.php',
                        'assets/shop/js/greetings.js',
                        'features/dynamically_greeting_a_customer.feature',
                        'features/statically_greeting_a_customer.feature',
                        'config/services.xml',
                    ]
                    dirs_to_remove = ['templates/shop/greeting']

                    for f in files_to_remove:
                        if os.path.exists(f):
                            os.remove(f)
                    for d in dirs_to_remove:
                        if os.path.exists(d):
                            shutil.rmtree(d)

                    ext_dir = 'src/DependencyInjection'
                    for fname in os.listdir(ext_dir):
                        if fname.endswith('Extension.php'):
                            path = os.path.join(ext_dir, fname)
                            lines = open(path).readlines()
                            lines = [l for l in lines if not re.search(r'XmlFileLoader|FileLocator|services\.xml', l)]
                            open(path, 'w').writelines(lines)

                    for f in ['config/twig_hooks/shop.yaml', 'config/routes/shop.yaml',
                              'config/routes/admin.yaml', 'assets/shop/entrypoint.js']:
                        if os.path.exists(f):
                            open(f, 'w').close()

                    print("Skeleton cleaned up")
                    EOF

            -
                name: Apply templates
                working-directory: /tmp/plugin
                env:
                    COMPANY: ${{ inputs.company }}
                    NAME: ${{ inputs.name }}
                    DESCRIPTION: ${{ inputs.description }}
                    COMPANY_KEBAB: ${{ steps.meta.outputs.company_kebab }}
                    NAME_KEBAB: ${{ steps.meta.outputs.name_kebab }}
                run: |
                    cp -r $GITHUB_WORKSPACE/templates/. .

                    python3 - <<'EOF'
                    import os
                    company = os.environ['COMPANY']
                    name = os.environ['NAME']
                    bundle_class = f"{company}Sylius{name}Plugin"
                    package = f"{os.environ['COMPANY_KEBAB']}/sylius-{os.environ['NAME_KEBAB']}-plugin"
                    description = os.environ['DESCRIPTION']
                    content = open('README.md').read()
                    content = content.replace('{BundleClass}', bundle_class)
                    content = content.replace('{description}', description)
                    content = content.replace('{package}', package)
                    open('README.md', 'w').write(content)
                    EOF

            -
                name: Push to target repo
                working-directory: /tmp/plugin
                run: |
                    rm -rf .git
                    git init -b main
                    git config user.name "guiziweb-bot[bot]"
                    git config user.email "guiziweb-bot[bot]@users.noreply.github.com"
                    git remote add origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ inputs.org }}/${{ inputs.repo }}.git
                    git add -A
                    git commit -m "chore: bootstrap plugin from skeleton"
                    git push origin main