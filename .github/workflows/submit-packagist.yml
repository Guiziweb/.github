name: Submit to Packagist

on:
    workflow_call:

jobs:
    submit:
        runs-on: ubuntu-latest
        steps:
            -
                uses: actions/create-github-app-token@v1
                id: app-token
                with:
                    app-id: ${{ secrets.APP_ID }}
                    private-key: ${{ secrets.APP_PRIVATE_KEY }}

            -
                uses: actions/checkout@v4
                with:
                    token: ${{ steps.app-token.outputs.token }}

            -
                name: Check if package already exists
                id: check
                run: |
                    PACKAGE=$(python3 -c "import json; print(json.load(open('composer.json'))['name'])")
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://repo.packagist.org/p2/${PACKAGE}.json")
                    if [ "$STATUS" = "200" ]; then
                        echo "Package ${PACKAGE} already exists on Packagist, skipping."
                        echo "exists=true" >> $GITHUB_OUTPUT
                    else
                        echo "exists=false" >> $GITHUB_OUTPUT
                    fi

            -
                name: Submit package to Packagist
                if: steps.check.outputs.exists == 'false'
                run: |
                    RESPONSE=$(curl -s -X POST \
                        -H 'Content-Type: application/json' \
                        -H "Authorization: Bearer ${{ secrets.PACKAGIST_USERNAME }}:${{ secrets.PACKAGIST_TOKEN }}" \
                        'https://packagist.org/api/create-package' \
                        -d "{\"repository\": \"https://github.com/${{ github.repository }}\"}")
                    echo "$RESPONSE"
                    if echo "$RESPONSE" | grep -q '"status":"success"'; then
                        echo "Package successfully submitted to Packagist!"
                    else
                        echo "Submission failed."
                        exit 1
                    fi